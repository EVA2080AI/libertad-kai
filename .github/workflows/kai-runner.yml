name: KAI Runner

on:
  schedule:
    - cron: '0 * * * *'  # Cada hora
  workflow_dispatch:  # También manual

jobs:
  run-kai:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          pip install requests python-dotenv python-telegram-bot pyyaml
      
      - name: Run KAI Life Cycle
        run: |
          python3 kai_life.py quick
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      
      - name: Send Telegram Update
        run: |
          STATUS=$(python3 -c "import json; d=json.load(open('core/kai_state.json')); return f\"Ciclos: {d['cycles']} | Nivel: {d['level']} | Ganado: \${d['total_earned']:.2f}\"" 2>/dev/null || echo "Sin datos")
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=🫀 KAI Live: $STATUS - $(date '+%H:%M UTC')"
